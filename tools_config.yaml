tools:
  - name: system_get_weather
    title: 获取天气
    description: 获取指定城市的当前或未来天气信息。
    parameters:
      type: object
      properties:
        location:
          type: string
          description: 城市名称，例如：北京、上海
        days:
          type: integer
          description: 查询天数范围。0表示当前时刻天气，1表示今日全天天气，2表示包含今日的两天天气。
      required: ["location", "days"]
    module: backend.system_tools.weather
    function_name: get_weather

  - name: system_read_file
    title: 读取文件
    description: >
      读取指定路径的文件内容。自动根据文件扩展名选择最佳解析策略，并返回包含内容、格式和元数据的字典。
      支持的文件类型：
      1. 纯文本/代码：.txt, .py, .js, .json, .yaml, .md 等（自动探测编码，如 UTF-8/GBK）。
      2. 表格数据：.csv, .tsv, .xlsx, .xls（转换为 Markdown 表格，Excel 支持多 Sheet 读取）。
      3. 文档文件：.pdf, .docx, .pptx, .doc, .ppt（提取文本并转换为 Markdown，对大文件有截断保护）。
      4. 图片文件：.png, .jpg, .jpeg 等（默认返回图片路径描述，可配置返回 base64 数据）。
      5. 其他：作为二进制文件返回基础元信息。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 目标文件路径（支持相对路径或绝对路径）。
        sheet_name:
          description: 仅对 Excel 文件有效，指定要读取的 sheet 名称或索引（从 0 开始）。非 Excel 文件请勿提供此参数。
          oneOf:
            - type: string
            - type: integer
        encoding:
          type: string
          description: 手动指定文件编码（如 'gbk', 'utf-8'）。如果不指定，系统将自动探测编码。
        return_image_base64:
          type: boolean
          description: 仅对图片有效。若为 true，返回图片的 base64 编码数据；若为 false（默认），返回图片的绝对路径信息。
      required: ["path"]
    module: backend.system_tools.reader
    function_name: file_read

  - name: system_write_file
    title: 写入文件
    description: 将文本内容写入指定路径的文件。支持全量覆盖或追加模式。若文件所在目录不存在会自动递归创建。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 目标文件路径（支持相对路径或绝对路径）。
        content:
          type: string
          description: 要写入文件的完整文本内容。
        overwrite:
          type: boolean
          description: 写入模式。true表示全量覆盖原文件（默认），false表示在原文件末尾追加内容。
        encoding:
          type: string
          description: 文件编码格式，默认为 "UTF-8"。
      required: ["path", "content"]
    module: backend.system_tools.writer
    function_name: file_write

  - name: system_patch_file
    title: 文件补丁
    description: 对指定文件进行局部的精准修改、插入或删除。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 目标文件路径（相对或绝对路径）。
        search:
          type: string
          description: 作为定位锚点的原有文本块。必须在文件中严格匹配且唯一存在，注意空格、缩进和换行符需与原文件完全一致。
        replace:
          type: string
          description: 准备替换进去的新文本块。若为删除操作，请填入空字符串。
        replace_all:
          type: boolean
          description: 是否允许批量替换多处匹配项。默认为 false（仅允许唯一匹配）。
        dry_run:
          type: boolean
          description: 试探模式。若为 true，仅校验 search 是否能唯一匹配，不实际修改文件。适用于不确定匹配是否准确时的前置检查。默认为 false。
        encoding:
          type: string
          description: 文件编码，默认为 UTF-8。
      required: ["path", "search", "replace"]
    module: backend.system_tools.writer
    function_name: file_patch

  - name: system_create_project_tree
    title: 项目创建
    description: 根据目录树文本批量创建项目目录和文件。支持 tree 命令输出格式（├── └── │）、Markdown 代码块树形结构以及简单缩进格式。常用于项目初始化。
    parameters:
      type: object
      properties:
        tree:
          type: string
          description: 目录结构的纯文本表示，可包含 tree 符号或使用空格缩进。
        path:
          type: string
          description: 项目创建的根路径（相对或绝对路径）。
      required: ["tree", "path"]
    module: backend.system_tools.project_creator
    function_name: create_project_tree

  - name: system_read_file_list
    title: 列出文件
    description: 递归列出指定目录下的所有文件，自动应用 .gitignore 忽略规则。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要列出的目录路径（支持相对或绝对路径）。
        show_hidden:
          type: boolean
          description: 是否显示以点（.）开头的隐藏文件。默认为 false。
        exclude_patterns:
          type: array
          items:
            type: string
          description: 额外的排除模式列表（支持通配符），例如 ["*.log", "temp/", ".env"]。当目录庞大导致结果被截断时，强烈建议使用此参数排除无关目录。
        follow_symlinks:
          type: boolean
          description: 是否跟随目录类型的符号链接进行递归遍历。默认为 false。
        max_files:
          type: integer
          description: 返回的最大文件数量，防止上下文溢出。默认为 500，超出将被截断并提示。如需更多结果请缩小搜索路径。
        max_depth:
          type: integer
          description: 递归的最大深度，防止无限循环。默认为 10。
        detailed:
          type: boolean
          description: 是否返回文件大小和修改时间。默认为 false（仅返回相对路径以节省 Token）；若为 true，返回格式为 "相对路径 | 大小 | 修改时间"。
      required: ["path"]
    module: backend.system_tools.file_lister
    function_name: read_file_list

  - name: system_kb_list
    title: 浏览知识库
    description: >
      列出「我的知识库」的目录树结构（相对知识库根目录的路径，目录以 / 结尾）。
      当用户询问、检索或需要基于其个人知识库进行分析时，先用本工具了解知识库中都有哪些笔记，
      再用 system_kb_read 按需读取具体文件内容。若知识库尚未配置，会返回提示信息。
    parameters:
      type: object
      properties:
        subpath:
          type: string
          description: 相对知识库根目录的子目录路径。空字符串（默认）表示从知识库根目录开始列出。
        max_files:
          type: integer
          description: 返回的最大条目数量，防止上下文溢出。默认为 500，超出将被截断并提示。
        max_depth:
          type: integer
          description: 递归的最大深度，防止无限循环。默认为 10。
    module: backend.system_tools.kb_reader
    function_name: kb_list

  - name: system_kb_read
    title: 读取知识库笔记
    description: >
      读取「我的知识库」中某个文件的内容用于分析。path 必须是相对知识库根目录的路径
      （通常来自 system_kb_list 的返回结果）。自动根据扩展名解析多种格式：
      纯文本/Markdown/代码、CSV/Excel 表格、PDF/Word 文档、图片等，返回内容与元数据。
      本工具为只读，不会修改用户的任何笔记。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 相对知识库根目录的文件路径，例如 "01-输入系统/输入索引.md"。
        sheet_name:
          type: string
          description: 仅对 Excel 文件有效，指定要读取的 sheet 名称。非 Excel 文件请勿提供。
        encoding:
          type: string
          description: 手动指定文件编码（如 'gbk'、'utf-8'）。不指定时自动探测。
        max_size_mb:
          type: integer
          description: 允许读取的最大文件大小（MB），默认 10。
      required: ["path"]
    module: backend.system_tools.kb_reader
    function_name: kb_read

  - name: system_kb_search
    title: 检索知识库
    description: >
      对「我的知识库」做语义检索（向量检索），返回与问题最相关的笔记片段
      （含来源文件路径、标题路径、内容）。当用户的问题可能与其个人笔记相关时，
      应优先使用本工具快速定位相关内容，再按需用 system_kb_read 读取完整笔记。
      相比 system_kb_list 按目录名猜测，本工具按语义命中，更精准。
      若知识库尚未建立索引，会返回提示，请引导用户在「知识库设置」中重建索引。
    parameters:
      type: object
      properties:
        query:
          type: string
          description: 检索问题或关键语义描述，例如 "我关于时间管理的洞见"。
        top_k:
          type: integer
          description: 返回最相关的片段数量，默认 5，最大 20。
      required: ["query"]
    module: backend.system_tools.kb_search
    function_name: kb_search

  - name: system_run_command
    title: 执行命令
    description: >
      在工作区目录内执行一条 shell 命令，并返回执行结果（return_code、stdout、stderr）。
      典型用途：把已写入磁盘的脚本真正跑起来生成产物，例如用 pptxgenjs 生成 PPTX 时执行
      "node compile.js"，或运行 Python 构建脚本、npm 命令等。
      注意事项：
      1. 工作目录（cwd）必须位于工作区内，默认为工作区根目录；需要在子目录执行时用 cwd 指定相对路径。
      2. 命令有超时保护（默认 30 秒，最大 600 秒），超时会被强制终止。
      3. 执行后应检查 return_code 是否为 0；非 0 表示失败，须复述 stderr 给用户，不要谎报成功。
      4. 生成产物后，请用绝对路径或 /files/generate/ 链接在正文中渲染，供用户点击打开或下载。
    parameters:
      type: object
      properties:
        command:
          type: string
          description: 要执行的完整命令行字符串，例如 "node compile.js"。
        cwd:
          type: string
          description: 命令的工作目录（相对工作区的路径或绝对路径），必须位于工作区内。省略时默认为工作区根目录。
        timeout:
          type: integer
          description: 超时时间（秒），默认 120，最大 600。
      required: ["command"]
    module: backend.system_tools.runner
    function_name: run_command

  - name: system_delegate_task
    title: 委派子任务
    description: >
      将独立子任务委派给子智能体并行处理。子智能体拥有独立的上下文窗口和受限工具集，
      完成后将结果返回。适用于可并行分解的任务，例如"把这三个文件分别总结要点"。

      重要提示：
      1. task 参数需包含完整的任务描述，子智能体看不到主对话的历史记录。
      2. tools 参数用于限制子智能体可调用的工具（省略则仅允许只读工具）。
      3. 子智能体不能再次委派任务（防止无限递归）。
    parameters:
      type: object
      properties:
        task:
          type: string
          description: 要委派给子智能体的完整任务描述。需自包含，因为子智能体没有主对话上下文。
        tools:
          type: array
          items:
            type: string
          description: 允许子智能体使用的工具名称列表。省略时默认仅允许只读工具（文件读取、知识库检索、天气查询等）。
      required: ["task"]
    module: backend.system_tools.delegate
    function_name: delegate_task
