# app_config.yaml
# 应用配置

# 数据存储根目录（可写，支持绝对路径或相对路径）
# 绝对路径示例：C:\ProgramData\.MyWorkbench
# 相对路径示例：./data（相对于可执行文件所在目录）
data_dir: "C:\\ProgramData\\.MyWorkbench"

# 子目录（相对于 data_dir）
uploads_dir: "data/uploads"
generate_dir: "data/generate"
logs_dir: "logs"
temp_dir: "temp"

# 配置文件（mcp_config.json）存放路径
# 支持绝对路径或相对于 data_dir
mcp_config_path: "mcp_config.json"

# 静态文件目录（只读，打包时位于 _MEIPASS 内）
# 此路径相对于项目根目录（开发时）或 _MEIPASS（打包后）
static_dir: "html"

# 其他配置
max_upload_size_mb: 100

# 工具调用步数上限（单次对话中 LLM 最多进行多少轮工具调用）
# 复杂任务（如 PPT 生成、多步骤脚本执行）建议提高此值
max_tool_steps: 50

# 模型调用容错配置（可选）
retry:
  max_retries: 3      # API 调用失败最大重试次数
  base_delay: 1.0     # 重试基础间隔（秒），实际延迟 = base_delay * 2^attempt

# 可选：模型调用失败时的全局降级配置
fallback:
  enabled: false
  model_name: ""
  base_url: ""
  api_key: ""

# 语音服务配置（STT 语音转文字 + TTS 文字转语音）
# 注意：前端已使用浏览器原生 SpeechRecognition / speechSynthesis，无需后端 API。
# 以下配置为可选增强（例如需要更高精度的 whisper 或更自然的 TTS 音色时启用）。
# 如果留空，则自动复用聊天模型的 API Key 和 Base URL。
voice:
  enabled: true
  # STT（语音转文字）模型，如 whisper-1
  stt_model: "whisper-1"
  # TTS（文字转语音）模型，如 tts-1 或 tts-1-hd
  tts_model: "tts-1"
  # TTS 语音音色：alloy / echo / fable / onyx / nova / shimmer
  tts_voice: "nova"
  # 语音服务的 API 地址和 Key（留空则复用 LLM 配置）
  stt_base_url: ""
  stt_api_key: ""
  tts_base_url: ""
  tts_api_key: ""

# 智能模型切换配置（可选，默认关闭，由前端 localStorage 控制）
auto_switch:
  enabled: false          # 默认关闭，用户可在设置中手动开启
  rules:                  # 角色 → 使用场景映射
    vision: "图片/多模态输入"
    audio: "语音输入/输出"
    reasoning: "深度推理/分析/代码审查"
    fast: "简单快速对话"
    default: "以上均不匹配时的默认模型"

# 工具审批配置（可选，默认启用）
tool_approval:
  enabled: false
  # 需要用户审批的敏感工具列表
  sensitive_tools:
    - system_write_file
    - system_patch_file
    - system_run_command
    - system_delegate_task
  # 是否支持"此会话始终允许"（同类工具一次批准后不再询问）
  session_whitelist: true

# OCR 配置（可选，需手动安装 Tesseract OCR 系统包）
ocr:
  enabled: false
  engine: "tesseract"
  lang: "chi_sim+eng"

# Skill 智能选择配置
skill_selection:
  enabled: true
  top_k: 5
  min_similarity: 0.3

# Skill 优先模式配置
# 当技能与用户查询的语义相似度超过阈值时，系统提示词会注入优先指令，
# 引导 LLM 优先使用匹配的技能，技能无法满足时才回退到系统工具。
skill_first:
  enabled: true          # 是否启用技能优先模式
  threshold: 0.4         # 相似度阈值（0-1），超过此值触发"技能优先"指令